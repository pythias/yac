name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    runs-on: macos-latest
    outputs:
      version: ${{ steps.dmg.outputs.version }}
      sha256_arm: ${{ steps.dmg.outputs.sha256_arm }}
      sha256_intel: ${{ steps.dmg.outputs.sha256_intel }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install
        working-directory: ui

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Import Apple Certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo $APPLE_CERTIFICATE | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          rm certificate.p12
          security find-identity -v -p codesigning build.keychain
          CERT_ID=$(security find-identity -v -p codesigning build.keychain | awk -F'"' '/Developer ID Application/ { print $2; exit }')
          if [ -z "$CERT_ID" ]; then
            echo "Developer ID Application signing identity not found in build.keychain."
            exit 1
          fi
          CERT_TEAM_ID=$(echo "$CERT_ID" | sed -n 's/.*(\([A-Z0-9][A-Z0-9]*\)).*/\1/p')
          if [ -z "$CERT_TEAM_ID" ]; then
            echo "Could not extract Apple Team ID from signing identity."
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"
          echo "APPLE_TEAM_ID=$CERT_TEAM_ID" >> "$GITHUB_ENV"
          echo "Using signing identity: $CERT_ID"
          echo "Using Apple Team ID: $CERT_TEAM_ID"

      - name: Build Tauri app (Apple Silicon)
        run: cargo tauri build --target aarch64-apple-darwin
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}

      - name: Verify Apple Silicon signing
        run: |
          APP="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Yac IDE.app"
          codesign --display --verbose=4 "$APP"
          codesign --verify --deep --strict --verbose=4 "$APP"
          spctl --assess --type execute --verbose=4 "$APP"
          xcrun stapler validate "$APP"

      - name: Build Tauri app (Intel)
        run: cargo tauri build --target x86_64-apple-darwin
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}

      - name: Verify Intel signing
        run: |
          APP="src-tauri/target/x86_64-apple-darwin/release/bundle/macos/Yac IDE.app"
          codesign --display --verbose=4 "$APP"
          codesign --verify --deep --strict --verbose=4 "$APP"
          spctl --assess --type execute --verbose=4 "$APP"
          xcrun stapler validate "$APP"

      - name: Package DMGs and compute checksums
        id: dmg
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          ARM_SRC=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
          INTEL_SRC=$(find src-tauri/target/x86_64-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)

          DEST_DIR="$(dirname "$ARM_SRC")"
          ARM_V="${DEST_DIR}/Yac.IDE_${VERSION}_aarch64.dmg"
          INTEL_V="${DEST_DIR}/Yac.IDE_${VERSION}_x64.dmg"
          ARM_L="${DEST_DIR}/Yac.IDE_latest_aarch64.dmg"
          INTEL_L="${DEST_DIR}/Yac.IDE_latest_x64.dmg"

          cp "$ARM_SRC" "$ARM_V"
          cp "$ARM_SRC" "$ARM_L"
          cp "$INTEL_SRC" "$INTEL_V"
          cp "$INTEL_SRC" "$INTEL_L"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha256_arm=$(shasum -a 256 "$ARM_V" | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "sha256_intel=$(shasum -a 256 "$INTEL_V" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-assets
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/Yac.IDE_*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install
        working-directory: ui

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Tauri app (NSIS)
        run: cargo tauri build

      - name: Collect Windows installer
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          mkdir -p upload
          SRC=$(find src-tauri/target/release/bundle/nsis -name "*.exe" | head -1)
          cp "$SRC" "upload/Yac.IDE_${VERSION}_x64-setup.exe"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-assets
          path: upload/*

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install
        working-directory: ui

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Tauri app (deb + AppImage)
        run: cargo tauri build

      - name: Collect Linux bundles
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          mkdir -p upload
          DEB_SRC=$(find src-tauri/target/release/bundle/deb -name "*.deb" | head -1)
          IMG_SRC=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" | head -1)
          cp "$DEB_SRC" "upload/Yac.IDE_${VERSION}_amd64.deb"
          cp "$IMG_SRC" "upload/Yac.IDE_${VERSION}_amd64.AppImage"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-assets
          path: upload/*

  publish:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-release-assets
          path: dist/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-release-assets
          path: dist/windows

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-release-assets
          path: dist/linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/macos/*
            dist/windows/*
            dist/linux/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout homebrew-tools tap
        uses: actions/checkout@v4
        with:
          repository: pythias/homebrew-tools
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tools

      - name: Replace Homebrew Cask
        env:
          PKG_VERSION: ${{ needs.build-macos.outputs.version }}
          SHA_ARM: ${{ needs.build-macos.outputs.sha256_arm }}
          SHA_INTEL: ${{ needs.build-macos.outputs.sha256_intel }}
        run: |
          cd homebrew-tools
          mkdir -p Casks
          cat <<'RUBY' > Casks/yac.rb
          cask "yac" do
            version "__PKG_VERSION__"

            on_arm do
              url "https://github.com/pythias/yac/releases/download/v#{version}/Yac.IDE_#{version}_aarch64.dmg",
                  verified: "github.com/pythias/yac/"
              sha256 "__SHA_ARM__"
            end

            on_intel do
              url "https://github.com/pythias/yac/releases/download/v#{version}/Yac.IDE_#{version}_x64.dmg",
                  verified: "github.com/pythias/yac/"
              sha256 "__SHA_INTEL__"
            end

            name "Yac IDE"
            desc "A minimal IDE built with Tauri + React"
            homepage "https://github.com/pythias/yac"

            app "Yac IDE.app"
          end
          RUBY
          sed -i \
            -e "s/__PKG_VERSION__/${PKG_VERSION}/g" \
            -e "s/__SHA_ARM__/${SHA_ARM}/g" \
            -e "s/__SHA_INTEL__/${SHA_INTEL}/g" \
            Casks/yac.rb
          ruby -c Casks/yac.rb
          cat Casks/yac.rb

      - name: Commit and push Homebrew Cask
        run: |
          cd homebrew-tools
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/yac.rb
          if git diff --cached --quiet; then
            echo "Casks/yac.rb already matches this release."
            exit 0
          fi
          git commit -m "chore: update yac to ${{ github.ref_name }}"
          git push
